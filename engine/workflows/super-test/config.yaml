# Super-Test config — MiMo-led exploratory bug-harvesting. Reuses progressive-test's executor/provider.
super_test:
  executor:
    runtime: auto                        # auto | opencode | mimo-code — BOTH can drive Super-Test
    cli_model: xiaomi-token-plan-sgp/mimo-v2.5
    provider: xiaomi-token-plan-sgp
    model: mimo-v2.5
    browser_tool: agent-browser          # reused from progressive-test/.agentflow/bin/agent-browser
    role: DRIVER                          # Topology B: the executor (opencode OR mimo-code) drives
    driver_brief: engine/workflows/super-test/integrations/mimocode-super-test.md
    preflight: engine/workflows/super-test/bin/mimocode-preflight
    project_instruction_required: AGENTS.md
    # opencode:  `opencode run --model <cli_model> "<prompt>"` (proven path)
    # mimo-code: set SUPERTEST_MIMO_CODE_BIN (default `mimo`) and/or SUPERTEST_MIMO_CODE_CMD="<cmd with {prompt_file}>"
    # Before first real run: `bash engine/workflows/super-test/bin/mimocode-preflight --strict`

  harvest:
    max_bugs_before_opus: 25
    max_blockers_before_opus: 5
    max_duration_minutes: 180
    allow_bypass: true
    allow_code_changes_during_harvest: false   # ENFORCED: harvest must leave the target git diff empty

  stop_conditions:                        # MiMo stops HARVEST + writes 07-opus-request on ANY of these
    - COVERAGE_COMPLETE
    - MAX_BUGS_REACHED
    - MAX_BLOCKERS_REACHED
    - MAX_TIME_REACHED
    - NO_MORE_REACHABLE_FLOWS
    - CRITICAL_SYSTEMIC_BUG

  bypass:
    allowed: [close_modal, refresh, back_forward, direct_route, choose_other_record, skip_blocked_action, logout_login]
    forbidden: [source_code_change, db_mutation, disable_validation, mock_api_without_policy, treat_bypass_as_pass]

  opus:                                   # M2 — the batch-RCA specialist (NOT an orchestrator)
    model: opus                          # CLI alias (version-robust). Headless call adds: --permission-mode bypassPermissions --max-turns --add-dir + timeout (guard hook still enforces BLOCKs)
    effort: max
    call_style: file_handoff             # short prompt; long content in files; return status+path only
    output_stdout_policy: status_only

  codex:                                  # M2 — reviewer/gate for risky repair batches
    required_for: [api_contract_change, schema_change, shared_state_change, business_rule_change, multi_module_change, high_risk_batch]
    max_review_loops: 2

  implementation:                         # M3
    require_approved_plan: true
    allowlist_required: true              # enforced via engine/workflows/_shared/allowlist-check.py
    no_fallback_model: true

  retest:                                 # M3
    targeted_retest_required: true
    module_sweep_retest_required: true

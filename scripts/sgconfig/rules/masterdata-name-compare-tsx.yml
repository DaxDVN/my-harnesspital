id: mh-masterdata-name-compare-tsx
language: tsx
severity: warning
message: "String-literal compare inside .find() — likely matching master-data by name/code (e.g. === 'kinh') instead of a BE flag (IsDefault/Requires*/*Option) or Id. Audit V3."
note: "Prefer masterData.X.find(x => x.IsDefault) or compare by String(x.Id). The 'kinh' fallback in patient-admin-info-block.tsx:225 is the exact anti-pattern."
rule:
  all:
    - pattern: $A === $B
    - inside:
        kind: call_expression
        stopBy: end
        has:
          field: function
          regex: 'find'
constraints:
  B:
    kind: string
